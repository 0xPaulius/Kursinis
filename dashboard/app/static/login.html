<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prisijungimas — Logų analizė</title>
<script src="/static/js/tailwind.min.js"></script>
<link rel="stylesheet" href="/static/fonts/fonts.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        headline: ["Manrope", "sans-serif"],
        body:     ["Inter",   "sans-serif"],
        label:    ["Manrope", "sans-serif"],
      },
    },
  },
};
</script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center font-body">

<div class="w-full max-w-sm">
  <!-- Logo / title -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gray-900 mb-4">
      <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold font-headline text-gray-900">Logų analizė</h1>
    <p class="text-sm text-gray-500 mt-1">Prisijunkite prie sistemos</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <form id="login-form" novalidate>
      <!-- Error banner -->
      <div id="error-banner" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 flex items-center gap-2">
        <svg class="w-4 h-4 text-red-500 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span id="error-text" class="text-sm text-red-700"></span>
      </div>

      <!-- Username -->
      <div class="mb-4">
        <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">
          Vartotojo vardas
        </label>
        <input id="username" name="username" type="text" autocomplete="username"
          maxlength="64"
          class="w-full px-3.5 py-2.5 rounded-xl border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
          placeholder="admin">
        <p id="username-err" class="hidden mt-1 text-xs text-red-600"></p>
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">
          Slaptažodis
        </label>
        <div class="relative">
          <input id="password" name="password" type="password" autocomplete="current-password"
            maxlength="128"
            class="w-full px-3.5 py-2.5 rounded-xl border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition pr-10"
            placeholder="••••••••">
          <button type="button" id="toggle-pw"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition text-xs font-semibold select-none">
            Rodyti
          </button>
        </div>
        <p id="password-err" class="hidden mt-1 text-xs text-red-600"></p>
      </div>

      <!-- Submit -->
      <button type="submit" id="submit-btn"
        class="w-full py-2.5 rounded-xl bg-gray-900 text-white text-sm font-bold hover:bg-gray-700 active:bg-gray-800 transition disabled:opacity-50 disabled:cursor-not-allowed">
        Prisijungti
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-gray-400 mt-6">
    Logų analizės ir anomalijų aptikimo sistema &mdash; VU ISKS kursinis darbas
  </p>
</div>

<script>
(function () {
  // If already logged in, redirect to dashboard
  if (sessionStorage.getItem("auth_token")) {
    window.location.replace("/");
    return;
  }

  const form     = document.getElementById("login-form");
  const userEl   = document.getElementById("username");
  const passEl   = document.getElementById("password");
  const btnEl    = document.getElementById("submit-btn");
  const errBanner= document.getElementById("error-banner");
  const errText  = document.getElementById("error-text");
  const userErr  = document.getElementById("username-err");
  const passErr  = document.getElementById("password-err");
  const togglePw = document.getElementById("toggle-pw");

  togglePw.addEventListener("click", () => {
    const show = passEl.type === "password";
    passEl.type     = show ? "text" : "password";
    togglePw.textContent = show ? "Slėpti" : "Rodyti";
  });

  function clearErrors() {
    errBanner.classList.add("hidden");
    userErr.classList.add("hidden");
    passErr.classList.add("hidden");
    userEl.classList.remove("border-red-400");
    passEl.classList.remove("border-red-400");
  }

  function showFieldError(fieldEl, errEl, msg) {
    fieldEl.classList.add("border-red-400");
    errEl.textContent = msg;
    errEl.classList.remove("hidden");
  }

  function showBannerError(msg) {
    errText.textContent = msg;
    errBanner.classList.remove("hidden");
  }

  function validate() {
    let ok = true;
    clearErrors();
    if (!userEl.value.trim()) {
      showFieldError(userEl, userErr, "Vartotojo vardas negali būti tuščias");
      ok = false;
    }
    if (!passEl.value) {
      showFieldError(passEl, passErr, "Slaptažodis negali būti tuščias");
      ok = false;
    }
    return ok;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!validate()) return;

    btnEl.disabled = true;
    btnEl.textContent = "Jungiamasi...";

    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: userEl.value.trim(),
          password: passEl.value,
        }),
      });

      if (res.ok) {
        const data = await res.json();
        sessionStorage.setItem("auth_token",  data.token);
        sessionStorage.setItem("auth_user",   data.username);
        window.location.replace("/");
      } else {
        const err = await res.json().catch(() => ({}));
        if (res.status === 401) {
          showBannerError(err.detail || "Neteisingas vartotojo vardas arba slaptažodis");
          passEl.value = "";
          passEl.focus();
        } else if (res.status === 400) {
          showBannerError(err.detail || "Užpildykite visus laukus");
        } else {
          showBannerError("Serverio klaida. Bandykite vėliau.");
        }
      }
    } catch {
      showBannerError("Nepavyko prisijungti prie serverio. Patikrinkite ryšį.");
    } finally {
      btnEl.disabled = false;
      btnEl.textContent = "Prisijungti";
    }
  });
}());
</script>
</body>
</html>
