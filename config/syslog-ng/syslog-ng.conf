####################################################################
# syslog-ng konfigūracija
# Centrinis žurnalų kolektorius mažai organizacijai
#
# Priima logus per:
#   - UDP 514 (tinklo įrenginiai: MikroTik, Ubiquiti, Cisco)
#   - TCP 514 (Linux rsyslog, patikimesnis transportas)
#   - TCP 1514 (alternatyvus portas)
#
# Persiunčia į:
#   - Promtail per failų sistemą (/var/log/syslog-ng/)
#   - Logus rašo į failus pagal šaltinį ir severity
####################################################################

@version: 4.8
@include "scl.conf"

# ---- Globalūs nustatymai ----
options {
    chain_hostnames(off);
    flush_lines(0);
    use_dns(no);
    use_fqdn(no);
    dns_cache(no);
    owner("root");
    group("adm");
    perm(0640);
    stats(freq(0));
    keep_hostname(yes);
    create_dirs(yes);
};

# ---- Šaltiniai (Sources) ----

# Vietiniai logai iš paties konteinerio
source s_local {
    internal();
};

# Syslog priėmimas iš tinklo - pagrindinis portas
source s_network {
    # UDP - tinklo įrenginiai (MikroTik, switch'ai, AP)
    udp(
        ip("0.0.0.0")
        port(514)
    );
    # TCP - Linux serveriai, patikimesnis
    tcp(
        ip("0.0.0.0")
        port(514)
        max-connections(100)
    );
    # Alternatyvus TCP portas
    tcp(
        ip("0.0.0.0")
        port(1514)
        max-connections(100)
    );
};

# ---- Filtrai ----

# Pagal severity
filter f_emergency   { level(emerg); };
filter f_alert       { level(alert); };
filter f_critical    { level(crit); };
filter f_error       { level(err..emerg); };
filter f_warning     { level(warning); };
filter f_notice      { level(notice); };
filter f_info        { level(info); };
filter f_debug       { level(debug); };

# Pagal facility
filter f_auth        { facility(auth, authpriv); };
filter f_kern        { facility(kern); };
filter f_mail        { facility(mail); };
filter f_local       { facility(local0..local7); };

# Saugumo filtrai - potencialiai pavojingi įvykiai
filter f_security {
    match("Failed password" value("MESSAGE")) or
    match("authentication failure" value("MESSAGE")) or
    match("Invalid user" value("MESSAGE")) or
    match("BREAK-IN ATTEMPT" value("MESSAGE")) or
    match("refused connect" value("MESSAGE")) or
    match("unauthorized" value("MESSAGE")) or
    match("denied" value("MESSAGE")) or
    match("blocked" value("MESSAGE")) or
    match("attack" value("MESSAGE")) or
    match("DROP" value("MESSAGE")) or
    match("REJECT" value("MESSAGE"));
};

# ---- Paskirties vietos (Destinations) ----

# Visi logai į vieną failą (Promtail skaitys)
destination d_all {
    file(
        "/var/log/syslog-ng/all.log"
        template("${ISODATE} ${HOST} ${FACILITY}.${LEVEL} ${PROGRAM}[${PID}]: ${MESSAGE}\n")
        rotate-wait(1)
    );
};

# Saugumo logai atskirai
destination d_security {
    file(
        "/var/log/syslog-ng/security.log"
        template("${ISODATE} ${HOST} ${FACILITY}.${LEVEL} ${PROGRAM}[${PID}]: ${MESSAGE}\n")
        rotate-wait(1)
    );
};

# Pagal host - kiekvienam šaltiniui atskiras failas
destination d_by_host {
    file(
        "/var/log/syslog-ng/hosts/${HOST}/${YEAR}-${MONTH}-${DAY}.log"
        template("${ISODATE} ${FACILITY}.${LEVEL} ${PROGRAM}[${PID}]: ${MESSAGE}\n")
        create_dirs(yes)
    );
};

# Error ir aukščiau - atskiras failas
destination d_errors {
    file(
        "/var/log/syslog-ng/errors.log"
        template("${ISODATE} ${HOST} ${FACILITY}.${LEVEL} ${PROGRAM}[${PID}]: ${MESSAGE}\n")
        rotate-wait(1)
    );
};

# ---- Log keliai (Log paths) ----

# Visus tinklo logus rašome į bendrą failą
log {
    source(s_network);
    destination(d_all);
};

# Visus tinklo logus rašome pagal host
log {
    source(s_network);
    destination(d_by_host);
};

# Saugumo logai atskirai
log {
    source(s_network);
    filter(f_security);
    destination(d_security);
};

# Klaidų logai atskirai (error ir aukščiau)
log {
    source(s_network);
    filter(f_error);
    destination(d_errors);
};

# Vietiniai syslog-ng logai
log {
    source(s_local);
    destination(d_all);
};
